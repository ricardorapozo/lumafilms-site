<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<title>Luma Films — Produtora de Vídeo em São Paulo</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
body {
  font-family: "Helvetica Neue", Arial, sans-serif;
  background: #000;
}

/* BOTÃO VOLTAR */
.back-home {
  position: fixed;
  top: 30px;
  right: 30px;
  color: #fff;
  text-decoration: none;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0.5;
  transition: 0.3s;
  z-index: 10;
}

.back-home:hover {
  opacity: 1;
}

/* GRID */
.contact-container {
  display: flex;
  height: 100vh;
}

/* FOTO */
.contact-left {
  width: 50%;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.contact-left img {
  height: 100%;
  width: auto;
  object-fit: cover;
}

/* DIREITA */
.contact-right {
  width: 50%;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px;
}

/* CARD */
.contact-card {
  background: #fff;
  padding: 50px;
  width: 100%;
  max-width: 420px;
}

/* LOGO */
.logo {
  font-size: 30px;
  font-weight: 900;
  letter-spacing: 2px;
  margin-bottom: 10px;
  text-transform: uppercase;
}

/* INFO */
.contact-info {
  font-size: 12px;
  margin-bottom: 30px;
  opacity: 0.6;
  line-height: 1.6;
}

/* INPUTS */
form input,
form textarea {
  width: 100%;
  border: none;
  border-bottom: 1px solid #000;
  padding: 12px 0;
  margin-bottom: 25px;
  font-size: 14px;
  background: transparent;
}

form textarea {
  resize: none;
  height: 100px;
}

/* BOTÃO */
button {
  width: 100%;
  padding: 15px;
  border: 1px solid #000;
  background: transparent;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 2px;
  transition: 0.3s;
}

button:hover {
  background: #000;
  color: #fff;
}

/* RESPONSIVO */
@media(max-width: 900px) {
  .contact-container {
    flex-direction: column;
  }

  .contact-left {
    width: 100%;
    height: 40vh;
  }

  .contact-left img {
    width: 100%;
    height: auto;
  }

  .contact-right {
    width: 100%;
    padding: 40px 20px;
  }
}

</style>
</head>

<body>

<!-- BOTÃO VOLTAR -->
<a href="/" class="back-home">← Voltar</a>

<div class="contact-container">

  <!-- FOTO -->
  <div class="contact-left">
    <img src="img/contact-bg.jpg" alt="Luma Films">
  </div>

  <!-- FORM -->
  <div class="contact-right">

    <div class="contact-card">

      <div class="logo">Luma Films</div>

      <div class="contact-info">
        São Paulo — Brasil<br>
        +55 (11) 98302-2222
      </div>

      <form action="https://formspree.io/f/mqedneqn" method="POST">

        <input type="text" name="nome" placeholder="Nome" required>

        <input type="email" name="email" placeholder="Email" required>

        <input type="text" name="empresa" placeholder="Empresa (opcional)">

        <textarea name="mensagem" placeholder="Conte sobre seu projeto" required></textarea>

        <button type="submit">Enviar</button>

      </form>

    </div>

  </div>

</div>

</body>
</html>
