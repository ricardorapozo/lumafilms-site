<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>
            Luma Films - Produtora de Filmes e Vídeos Institucionais

        <meta content="" name="author">
        <meta content="" name="keywords">
        <meta content="width=device-width, initial-scale=1, maximum-scale=1" name="viewport">
        <!-- Luma v0.001 || rapozo || MAR26 -->
        <!-- style start -->
        <link href="css/plugins.css" media="all" rel="stylesheet" type="text/css">
        <link href="css/style.css" media="all" rel="stylesheet" type="text/css"><!-- style end -->
        <!-- google fonts start -->
        <link href="http://fonts.googleapis.com/css?family=Raleway:100,200,300,400,500,600,700,800,900%7COswald:300,400,700" rel="stylesheet" type="text/css"><!-- google fonts end -->
    </head>
    <body>
        <!-- preloader start -->
        <div class="preloader-bg"></div>
        <div id="preloader">
            <div id="preloader-status">
                <div class="preloader-position loader">
                    <span></span>
                </div>
            </div>
        </div><!-- preloader end -->
        <!-- top element start -->
        <div class="top-element top-position">
            Produzindo desde 2013
        </div><!-- top element end -->
        <!-- left element start -->
        <div class="left-element left-position">
            <!-- social icons start -->
            <ul>
                <li>
                    <a class="ion-social-twitter" href="#"><span>Twitter</span></a>
                </li>
                <li>
                    <a class="ion-social-facebook" href="https://www.facebook.com/lumafilms.org"><span>Facebook</span></a>
                </li>
                <li>
                    <a class="ion-social-instagram" href="https://www.instagram.com/lumafilmsbr/"><span>Instagram</span></a>
                </li>
            </ul><!-- social icons end -->
        </div><!-- left element end -->
        <!-- right element start -->
        <div class="right-element right-position" id="open-newsletter">
            <span class="ion-ios-paperplane"></span>Entre em Contato 
        </div><!-- right element end -->

        <!-- overlay start -->
        <div id="overlay"></div><!-- overlay end -->
        <!-- home start -->
        <section class="upper-page">
            <!-- center container start -->
            <div class="center-container-home fadeIn-element">
                <!-- center block start -->
                <div class="center-block-home">
                    <!-- page title wrapper start -->
                    <div class="page-title">
                        <!-- hero bg start -->
                        <div class="hero-fullscreen">
                            <!-- Vimeo video start -->
                            <div class="hero-bg hero-fullscreen-FIX">
                                <!-- Vimeo video containment start -->
                                <div id="vimeo-videoContainment">
                                    <!-- Vimeo video URL start -->
                                    <iframe data-fullscreeneo="" src="https://player.vimeo.com/video/280456386?autoplay=1&amp;background=1&amp;hd=1&amp;loop=1"></iframe><!-- Vimeo video URL end -->
                                </div><!-- Vimeo video containment end -->
                                <!-- Vimeo video mobile IMG start -->
                                <div class="vimeo-bg"></div><!-- Vimeo video mobile IMG end -->
                            </div><!-- Vimeo video end -->
                        </div><!-- hero bg end -->
                        <!-- page title start -->
                        <div class="page-title-content page-title-content-dark">
                            LUMA<br>
                            FILMS
                        </div><!-- page title end -->
                    </div><!-- page title wrapper end -->
                    <!-- play video button start -->
                    <div class="video-play-btn-wrapper">
                        <a class="" data-lity="" href="https://vimeo.com/280456386">
                        <div class="video-play-btn">
                            <i class="icon-play"></i>
                        </div></a>
                    </div><!-- play video button end -->
                </div><!-- center block end -->
            </div><!-- center container end -->
        </section><!-- home end -->
        
<!-- CONTACT PANEL -->
<div id="panel-newsletter">

    <div class="panel-all">

        <div class="right-element-newsletter">
            Fechar
        </div>

        <div class="lower-page">
            <div class="panel-all-inner">

                <div class="center-container">
                    <div class="center-block">

                        <div class="lower-content">

                            <div class="container sections">
                                <div class="row">

                                    <!-- LEFT TEXT -->
                                    <div class="col-sm-12 col-md-6 col-lg-6">

                                        <div class="page-title page-title-subscribe">
                                            <div class="page-title-content page-title-newsletter">
                                                CONTATO
                                            </div>
                                        </div>

                                        <div class="inner-divider-post"></div>

                                        <div class="panel-all-subtitle">
                                            Vamos conversar sobre seu projeto
                                        </div>

                                    </div>

                                    <!-- FORM -->
                                    <div class="col-sm-12 col-md-6 col-lg-6">

                                        <div class="inner-divider-post-mobile"></div>

                                        <div id="subscribe-wrapper">
                                            <div class="newsletter">

                                                <form action="https://formspree.io/f/mqedneqn" method="POST">

                                                    <input name="name" placeholder="Nome" type="text" required>

                                                    <input name="email" placeholder="Email" type="email" required>

                                                    <input name="company" placeholder="Empresa (opcional)" type="text">

                                                    <textarea name="message" placeholder="Conte sobre seu projeto" required style="
                                                        width:100%;
                                                        border:none;
                                                        border-bottom:1px solid #2e2e2e;
                                                        background:none;
                                                        text-align:center;
                                                        margin-top:10px;
                                                        resize:none;
                                                        height:80px;
                                                    "></textarea>

                                                    <div class="the-button-wrapper">
                                                        <button class="the-button the-button-submit" type="submit">
                                                            <span>ENVIAR</span>
                                                        </button>
                                                    </div>

                                                </form>

                                            </div>
                                        </div>

                                        <div class="inner-divider-post"></div>

                                        <div class="panel-all-subtitle">
                                            Respondemos rápido. Sem robô.
                                        </div>

                                    </div>

                                </div>
                            </div>

                        </div>

                    </div>
                </div>

            </div>
        </div>

    </div>

</div>

        <!-- scripts start -->
        <script src="js/plugins.js">
        </script> 
        <script src="js/luma.js">
        </script><!-- scripts end -->
    </body>
</html>
