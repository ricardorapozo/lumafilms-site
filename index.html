<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Luma Films</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      letter-spacing: 2px;
    }

    h1 {  
      font-size: 3rem;
      font-weight: 300;
    }

    p {
      margin-top: 10px;
      font-size: 0.9rem;
      opacity: 0.6;
    }

    .grain {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('https://grainy-gradients.vercel.app/noise.svg');
      opacity: 0.05;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div class="grain"></div>

  <div class="container">
    <h1>LUMA FILMS</h1>
    <p>produção audiovisual</p>
  </div>
</body>
</html>
